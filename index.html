  <meta name="description" content="Tillo Kochari — Gaziantep merkezli doğal gıda üreticisi. Antep fıstığı ezme, kurutulmuş meyve-sebze, reçel, pekmez, süt ürünleri, IQF ve aromatik yağlar. Top…" />
  <link rel="canonical" href="https://tillotarim.com/" />
  <link rel="alternate" hreflang="tr" href="https://tillotarim.com/tr/" />
  <link rel="alternate" hreflang="x-default" href="https://tillotarim.com/tr/" />
  <script>
(function() {
  var available = ["tr"];
  var fallbackLang = "tr";
  var defaultLang = "tr";
  var browserLangs = [];
  if (navigator.languages && navigator.languages.length) {
    navigator.languages.forEach(function(l) {
      var code = (l.split('-')[0] || '').toLowerCase();
      if (code && browserLangs.indexOf(code) === -1) browserLangs.push(code);
    });
  }
  if (!browserLangs.length && navigator.language) {
    browserLangs.push((navigator.language.split('-')[0] || defaultLang).toLowerCase());
  }
  var chosen = null;
  for (var i = 0; i < browserLangs.length; i++) {
    if (available.indexOf(browserLangs[i]) !== -1) {
      chosen = browserLangs[i];
      break;
    }
  }
  if (chosen === null) {
    chosen = fallbackLang;
  }
  var target = '/' + chosen + '/' + (location.search || '') + (location.hash || '');
  location.replace(target);
})();
  </script>
